# =============================================================================
# 数据收集提交页（collect_submit）部署到 Nginx 时常见 404 说明
# 把需要的片段合并进对应 server { }，不要整段复制多份 location /
# =============================================================================
#
# 一、确认物理路径
#   server 的 root（或本 location 的 alias）下必须存在：
#     collect_submit.html
#     collect_submit.php   （推荐用户访问此入口，子目录下接口路径正确）
#     ajax/collect/api.php
#
# 二、推荐访问地址
#   https://你的域名/（子目录/）collect_submit.php
#   若只打开 .html，请保证与 html 同目录下有 ajax/collect/api.php，且不要用错 root。
#
# 三、PHP 必须能执行 ajax 下的文件（与全站其它 .php 一致即可），示例：
#
#   location ~ \.php(?:$|/) {
#       fastcgi_pass   unix:/run/php/php8.2-fpm.sock;   # 按你机器实际套接字修改
#       fastcgi_index  index.php;
#       fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
#       include        fastcgi_params;
#   }
#
# 四、若整站还有 Pboot 伪静态，与 doc/nginx_front_rewrite.conf 一致即可；
#    collect_submit、ajax 为真实文件，一般不会被 rewrite 覆盖。
#
# 五、仍 404 时请在浏览器 F12 → Network 看是哪一个 URL 404（页面还是 api.php），
#    核对 root 下是否真有该文件。
# =============================================================================
