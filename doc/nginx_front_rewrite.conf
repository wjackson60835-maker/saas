# PbootCMS 前台伪静态（Apache 的 rewrite/.htaccess 在 Nginx 上需自行配置）
# 未配置时：直接访问 /yuceblk/142.html 会由 nginx 找物理文件 → 不存在 → 整页 404
#
# 用法：把下面 location 合并进站点 server { }（域名对应的 root 指向本程序根目录，且含 index.php）
#
# 注意：若站点装在子目录 /subdir/，请把 rewrite 里的 /index.php 改成 /subdir/index.php

location / {
    if (!-e $request_filename) {
        rewrite ^/(.*)$ /index.php?p=$1 last;
    }
}

# 可选：更常见的 try_files 写法（二选一，不要重复套两段）
# location / {
#     try_files $uri $uri/ /index.php?p=$uri&$args;
# }
