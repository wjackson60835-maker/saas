<script src="/skin/jquery.min.js"></script>
<script>
/** KJ_LOCK_* 为从 0 点起的分钟数：10:56 = 10*60+56，11:00 = 11*60+0。勿写 11*0+0（会得到 0，锁盘永远不触发） */
var KJ_LOCK_START_MIN = 10 * 60 + 56;
var KJ_LOCK_END_MIN = 11 * 60 + 0;

var kjNextPeriodCache = { qishu: '', number: '' };

function kjPad2(n) { return (n < 10 ? '0' : '') + n; }

function kjMinutesToLabel(mins) {
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    return kjPad2(h) + ':' + kjPad2(m);
}

function kjBeijingHmNow() {
    var parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(new Date());
    var h = 0, m = 0;
    parts.forEach(function (p) {
        if (p.type === 'hour') h = parseInt(p.value, 10);
        if (p.type === 'minute') m = parseInt(p.value, 10);
    });
    return h * 60 + m;
}

function kjIsFrontend2127Lock() {
    var t = kjBeijingHmNow();
    var a = KJ_LOCK_START_MIN;
    var b = KJ_LOCK_END_MIN;
    if (b > a) return t >= a && t < b;
    if (b < a) return t >= a || t < b;
    return false;
}

function kjUpdateCountdown2127() {
    var el = document.getElementById('kjCountdown2127');
    if (!el) return;
    if (kjIsFrontend2127Lock()) {
        el.style.display = '';
        el.textContent = kjMinutesToLabel(KJ_LOCK_START_MIN) + '–' + kjMinutesToLabel(KJ_LOCK_END_MIN) + '（北京时间）开奖时段：上一期结果已隐藏';
        return;
    }
    el.textContent = '';
    el.style.display = 'none';
}

function kjApplyFrontend2127Hide() {
    if (!kjIsFrontend2127Lock()) return;
    var gray = 'background-color: #999999; color: #ffffff;';
    var s = new Date().toLocaleString('sv-SE', { timeZone: 'Asia/Shanghai' });
    var mm = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    var todayMd = mm ? (mm[2] + '月' + mm[3] + '日') : '';
    $('#qishu').text(kjNextPeriodCache.qishu);
    $('#number').text(kjNextPeriodCache.number);
    $('#nianyueri').text(todayMd);
    $('#dangqi').text('');
    for (var i = 1; i <= 7; i++) {
        $('#haoma' + i).text('');
        $('#shengxiao' + i).text('');
        $('#w' + i).attr('style', gray);
    }
}

function updateData() {
    $.ajax({
        url: '/ajax/xagetcode.php',
        type: 'GET',
        cache: false,
        dataType: 'json',
        success: function(data) {
            kjNextPeriodCache.qishu = data.qishu != null ? String(data.qishu) : '';
            kjNextPeriodCache.number = data.number != null ? String(data.number) : '';
            var secLeft = null;
            if (data.seconds_to_next_draw != null && data.seconds_to_next_draw !== '') {
                secLeft = parseInt(data.seconds_to_next_draw, 10);
                if (isNaN(secLeft)) secLeft = null;
            }
            if (secLeft === null) {
                secLeft = (function(str) {
                    if (!str || typeof str !== 'string') return null;
                    var p = str.split(':');
                    if (p.length !== 3) return null;
                    var h = parseInt(p[0], 10), m = parseInt(p[1], 10), s = parseInt(p[2], 10);
                    if (isNaN(h) || isNaN(m) || isNaN(s)) return null;
                    return h * 3600 + m * 60 + s;
                })(data.daojishi);
            }
            var predrawApi = (parseInt(data.pre_draw_lock, 10) === 1) || (secLeft !== null && secLeft > 0 && secLeft <= 180);
            var predraw = predrawApi || kjIsFrontend2127Lock();
            var gray = 'background-color: #999999; color: #ffffff;';
            $('#xinao').text(data.xinao);
            $('#laoao').text(data.laoao);
            $('#xianggang').text(data.xianggang);
            $('#daojishi').text(data.daojishi);
            $('#nextTime').text(data.footer_time || '21点30分');
            if (predraw) {
                var todayMd = (function() {
                    var s = new Date().toLocaleString('sv-SE', { timeZone: 'Asia/Shanghai' });
                    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
                    return m ? (m[2] + '月' + m[3] + '日') : data.nianyueri;
                })();
                $('#qishu').text(data.qishu || '');
                $('#number').text(data.number || '');
                $('#nianyueri').text(todayMd);
                $('#dangqi').text('');
                var i;
                for (i = 1; i <= 7; i++) {
                    $('#haoma' + i).text('');
                    $('#shengxiao' + i).text('');
                    $('#w' + i).attr('style', gray);
                }
            } else {
                $('#qishu').text(data.qishu);
                $('#number').text(data.number);
                $('#nianyueri').text(data.nianyueri);
                $('#haoma1').text(data.haoma1);
                $("#w1").attr("style", data.ys1);
                $('#haoma2').text(data.haoma2);
                $("#w2").attr("style", data.ys2);
                $('#haoma3').text(data.haoma3);
                $("#w3").attr("style", data.ys3);
                $('#haoma4').text(data.haoma4);
                $("#w4").attr("style", data.ys4);
                $('#haoma5').text(data.haoma5);
                $("#w5").attr("style", data.ys5);
                $('#haoma6').text(data.haoma6);
                $("#w6").attr("style", data.ys6);
                $('#haoma7').text(data.haoma7);
                $("#w7").attr("style", data.ys7);
                $('#dangqi').text(data.dangqi);
                $('#shengxiao1').text(data.shengxiao1);
                $('#shengxiao2').text(data.shengxiao2);
                $('#shengxiao3').text(data.shengxiao3);
                $('#shengxiao4').text(data.shengxiao4);
                $('#shengxiao5').text(data.shengxiao5);
                $('#shengxiao6').text(data.shengxiao6);
                $('#shengxiao7').text(data.shengxiao7);
            }
            kjUpdateCountdown2127();
            setTimeout(updateData, 1000);
        }
    });
}
$(document).ready(function() {
    kjUpdateCountdown2127();
    setInterval(function () {
        kjUpdateCountdown2127();
        if (kjIsFrontend2127Lock()) kjApplyFrontend2127Hide();
    }, 1000);
    updateData();
});
</script>

			theRequest[strs[i].split("=")[0]]=unescape(strs[i].split("=")[1]);
		}
	}
	return theRequest;
}
